name: Backend PR CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      source_count: ${{ steps.detect.outputs.source_count }}
      has_custom_ci: ${{ steps.detect.outputs.has_custom_ci }}
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend code and CI entrypoints
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_COUNT="$(git ls-files | { grep -E '^(src|app|cmd|internal|api|mcp|server)/|(\.ts|\.tsx|\.js|\.jsx|\.mjs|\.cjs|\.py|\.go|\.rs|\.java|\.kt|\.cs)$' || true; } | wc -l | tr -d ' ')"
          HAS_CUSTOM_CI="false"
          HAS_NODE="false"

          if [[ -f "scripts/ci/lint.sh" && -f "scripts/ci/test.sh" && -f "scripts/ci/build.sh" ]]; then
            HAS_CUSTOM_CI="true"
          fi

          if [[ -f "package.json" ]]; then
            HAS_NODE="true"
          fi

          echo "source_count=$SOURCE_COUNT" >> "$GITHUB_OUTPUT"
          echo "has_custom_ci=$HAS_CUSTOM_CI" >> "$GITHUB_OUTPUT"
          echo "has_node=$HAS_NODE" >> "$GITHUB_OUTPUT"

      - name: Fail fast for empty or unconfigured backend CI
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_COUNT="${{ steps.detect.outputs.source_count }}"
          HAS_CUSTOM_CI="${{ steps.detect.outputs.has_custom_ci }}"
          HAS_NODE="${{ steps.detect.outputs.has_node }}"

          if [[ "$SOURCE_COUNT" -eq 0 && "$HAS_NODE" != "true" && "$HAS_CUSTOM_CI" != "true" ]]; then
            echo "::error::No backend source or build manifest detected. Add backend code (API/MCP) and wire CI via scripts/ci/{lint,test,build}.sh or package.json scripts."
            exit 1
          fi

          if [[ "$SOURCE_COUNT" -gt 0 && "$HAS_CUSTOM_CI" != "true" && "$HAS_NODE" != "true" ]]; then
            echo "::error::Backend code detected but no runnable CI contract found. Add executable scripts/ci/{lint,test,build}.sh or package.json scripts: lint, test, build."
            exit 1
          fi

  run-custom-ci:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_custom_ci == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint
        run: bash ./scripts/ci/lint.sh

      - name: Test
        run: bash ./scripts/ci/test.sh

      - name: Build
        run: bash ./scripts/ci/build.sh

  run-node-ci:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_custom_ci != 'true' && needs.detect.outputs.has_node == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f package-lock.json ]]; then
            npm ci
          else
            npm install
          fi

      - name: Ensure lint/test/build scripts exist
        shell: bash
        run: |
          set -euo pipefail

          node -e "const s=(require('./package.json').scripts)||{}; const m=['lint','test','build'].filter(k=>!s[k]); if(m.length){console.error('::error::Missing npm scripts: '+m.join(', ')); process.exit(1)}"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
